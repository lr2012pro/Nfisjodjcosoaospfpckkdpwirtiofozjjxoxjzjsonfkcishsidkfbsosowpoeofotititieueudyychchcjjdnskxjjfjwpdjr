<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🚆 London Live Day</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- Stylesheet -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- ── HEADER ── -->
  <header>
    <div class="header-inner">
      <div class="header-left">
        <span class="logo-icon">🚆</span>
        <div class="header-titles">
          <div class="app-title">London Live Day</div>
          <div class="app-sub">Real-time reisplanner</div>
        </div>
      </div>
      <div class="header-right">
        <div class="clock" id="clock">--:--:--</div>
        <div class="date-label" id="dateLabel">Laden...</div>
      </div>
    </div>
    <!-- Day progress bar -->
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
  </header>

  <!-- ── STATS BAR ── -->
  <div class="stats-bar">
    <div class="stats-inner">
      <div class="stat">
        <div class="stat-val green" id="statDone">0</div>
        <div class="stat-lbl">Afgerond</div>
      </div>
      <div class="stat">
        <div class="stat-val gold" id="statActive">–</div>
        <div class="stat-lbl">Nu bezig</div>
      </div>
      <div class="stat">
        <div class="stat-val" id="statNext">–</div>
        <div class="stat-lbl">Volgend</div>
      </div>
      <div class="stat">
        <div class="stat-val" id="statRemain">–</div>
        <div class="stat-lbl">Resterend</div>
      </div>
    </div>
  </div>

  <!-- ── MAIN TIMELINE ── -->
  <div class="container timeline-wrap" id="app"></div>

  <!-- ── SCROLL-TO-ACTIVE FAB ── -->
  <button class="scroll-hint" id="scrollBtn" onclick="scrollToActive()" title="Ga naar huidige activiteit">
    📍
  </button>

  <!-- ── FOOTER ── -->
  <footer>
    London Live Day App &mdash;
    <a href="https://maps.google.com" target="_blank" rel="noopener">Google Maps</a>
    &bull;
    <a href="https://tfl.gov.uk" target="_blank" rel="noopener">TfL Journey Planner</a>
    &bull;
    Alle tijden zijn lokaal BST
  </footer>

  <!-- App logic -->
  <script src="app.js"></script>

</body>
</html>
